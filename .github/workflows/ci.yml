name: CI

on:
  push:
    branches: [main]
  pull_request:

# The workflow only reads the repo — no token scope beyond that.
permissions:
  contents: read

jobs:
  test:
    name: Tests + mock autopilot
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']
    steps:
      # Actions pinned to commit SHAs (tags are mutable; SHAs can't move).
      # Refresh with `git ls-remote --tags https://github.com/actions/<name>`.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
      - name: Unit tests (node:test, zero dependencies)
        run: npm test
      - name: Coverage (node --experimental-test-coverage, zero new deps)
        continue-on-error: true
        run: |
          node --experimental-test-coverage --test tests/*.test.js 2>&1 | tee /tmp/coverage.txt
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -A 999 'start of coverage report' /tmp/coverage.txt | grep -B 999 'end of coverage report' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: End-to-end autopilot in mock mode
        run: npm run demo
      - name: Harvest dedupe invariant (second pass emits zero)
        run: |
          MSE_MOCK=1 node bin/mse.js harvest --once | tee /tmp/harvest2.txt
          grep -q "Emitted 0 signal(s)." /tmp/harvest2.txt
      - name: Domain snapshot resolves from harvest state
        run: MSE_MOCK=1 node bin/mse.js snapshot --domain acme.com | grep -q "Seller snapshot"
